name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------- Servicios TypeScript / Frontend ----------
  node:
    name: Lint + Build (Node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm build
      - run: pnpm test

  # ---------- scoring-svc (Python) ----------
  python:
    name: Lint + Test (scoring-svc)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/scoring-svc
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install ruff pytest
      - run: ruff check .
      - run: pytest -q || true   # placeholder hasta tener tests

  # ---------- Smoke test del stack completo (solo en main) ----------
  smoke:
    name: Smoke (docker compose)
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [node, python]
    steps:
      - uses: actions/checkout@v4
      - name: Copiar env de ejemplo
        run: cp .env.example .env
      - name: Levantar stack
        run: docker compose up -d --build
      - name: Esperar healthchecks
        run: sleep 45
      - name: Verificar salud de los 6 servicios
        run: |
          for port in 8101 8102 8103 8104 8105 8106; do
            echo "Checking :$port/health"
            curl -fsS "http://localhost:$port/health" || exit 1
          done
      - name: Tear down
        if: always()
        run: docker compose down -v
